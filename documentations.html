<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影像 - SJTU Programming Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            margin: auto;
            max-width: 1200px;
            min-height: 100vh;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto 1fr auto;
            grid-template-areas:
                "heading logo"
                "top-nav top-nav"
                "catalog catalog"
                "footer footer";
            gap: 20px;
            padding: 20px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
        }

        /* ===== HEADER & LOGO ===== */
        header {
            border-radius: 10px;
            background-color: #AD1730;
            grid-area: heading;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            grid-area: logo;
            display: flex;
            justify-content: flex-end;
        }

        .logo img {
            max-height: 100px;
            width: auto;
            border-radius: 10px;
        }

        /* ===== NAVIGATION ===== */
        .top-nav {
            grid-area: top-nav;
            background-color: #AD1730;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            gap: 20px;
        }

        .top-nav a {
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            transition: all 0.3s ease;
            color: white;
            border-radius: 25px;
        }

        .top-nav a:hover {
            background-color: #002B60;
            color: white;
            transform: translateY(-5px);
        }

        /* ===== CATALOG ===== */
        .catalog {
            grid-area: catalog;
            background-color: #002B60;
            border-radius: 10px;
            padding: 30px;
        }

        .catalog h2 {
            margin-bottom: 25px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            text-align: center;
            color: white;
        }

        .catalog-item {
            gap: 2px;
            border-radius: 10px;
            background-color: #AD1730;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .catalog-item:hover {
            background-color: #002B60;
            transform: translateY(-2px);
        }

        .catalog-item a {
            text-decoration: none;
            color: #FFD700;
        }

        .catalog-item a:hover {
            text-decoration: underline;
        }

        .catalog-item img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .catalog-item h3 {
            text-align: center;
            color: white;
        }

        footer {
            grid-area: footer;
            background-color: #AD1730;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
        <header>
            <h1>编程社团 - SJTU Programming Club - 学期2025-2026</h1>
        </header>

        <div class="logo">
            <a href="index.html" aria-label="Home page">
                <img src="images/Sjtu-logo-standard-red.png" alt="SJTU logo" height="100">
            </a>
        </div>

        <nav class="top-nav" aria-label="Main navigation">
            
            
            <a href="documentations.html">摄影/视频</a>
            
        </nav>

        <div class="catalog">
            <h2>节目目录 - Events List</h2>
            <div class="catalog-item">
                <a href="events/spellingbee.html">
                    <h3>Spelling Bee Competition</h3>
                </a>
            </div>
            <div class="catalog-item">
                <h3>Coming soon...</h3>
            </div>
            <div class="catalog-item">
                <h3>Coming soon...</h3>
            </div>
        </div>

        <footer>
            Copyright ©2026 SJTU Pre Uni. All rights reserved.
        </footer>
</body>
</html>
